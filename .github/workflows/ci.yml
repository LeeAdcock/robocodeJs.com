name: CI

# Continuous integration for pull requests and pushes to main (OWASP A06-1:
# there was previously no CI at all — no lint/test gate and no dependency
# scanning). Runs the two packages independently.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Prettier is applied by the husky pre-commit hook, but a hook is not a gate:
  # it is skipped by `--no-verify` and absent until someone runs a root
  # `npm install`. This job is the gate. It runs at the root because the
  # per-package `lint` scripts only cover `src test` — nothing else checks
  # top-level files or `ui/public/**`, which is exactly where formatting drifted.
  # `--check` (never `--write`): CI reports, it does not mutate the checkout.
  format:
    name: format (prettier --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Driven off `git ls-files` so only tracked files are checked; a bare
      # `**/*` glob walks node_modules and hangs. `.prettierignore` still applies.
      # -z/-0 keeps paths with spaces intact.
      - name: Check formatting of tracked files
        run: |
          git ls-files -z '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.css' '*.md' '*.yml' '*.yaml' \
            | xargs -0 npx prettier --check

  server:
    name: server (lint · build · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/npm-shrinkwrap.json
      # Strict install from the lockfile (also what buildspec.yaml uses).
      - run: npm ci
      - run: npx eslint src
      - run: npm run build
      - run: npm test
      # Dependency vulnerability gate. Fails the build on high/critical
      # advisories; moderate/low are reported but non-blocking.
      - run: npm audit --audit-level=high

  ui:
    name: ui (lint · build · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx eslint src
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high
