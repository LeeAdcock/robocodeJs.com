name: CI

# Continuous integration for pull requests and pushes to main (OWASP A06-1:
# there was previously no CI at all — no lint/test gate and no dependency
# scanning). Runs the two packages independently.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Prettier is applied by the husky pre-commit hook, but a hook is not a gate:
  # it is skipped by `--no-verify` and absent until someone runs a root
  # `npm install`. This job is the gate. It runs at the root because the
  # per-package `lint` scripts only cover `src test` — nothing else checks
  # top-level files or `ui/public/**`, which is exactly where formatting drifted.
  # `--check` (never `--write`): CI reports, it does not mutate the checkout.
  format:
    name: format (prettier --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Driven off `git ls-files` so only tracked files are checked; a bare
      # `**/*` glob walks node_modules and hangs. `.prettierignore` still applies.
      # -z/-0 keeps paths with spaces intact.
      - name: Check formatting of tracked files
        run: |
          git ls-files -z '*.ts' '*.tsx' '*.js' '*.jsx' '*.json' '*.css' '*.md' '*.yml' '*.yaml' \
            | xargs -0 npx prettier --check

  server:
    name: server (lint · build · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/npm-shrinkwrap.json
      # Strict install from the lockfile (also what buildspec.yaml uses).
      - run: npm ci
      # `src test`, not just `src`: prettier has always formatted both, but
      # ESLint only ever saw src, leaving the test suites unlinted.
      - run: npx eslint src test
      - run: npm run build
      # `test:coverage` (not plain `test`) so the same run feeds the combined
      # coverage gate below — no second test pass. Emits coverage-summary.json.
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-server
          path: server/coverage/coverage-summary.json
          retention-days: 1
      # Dependency vulnerability gate. Fails the build on high/critical
      # advisories; moderate/low are reported but non-blocking.
      - run: npm audit --audit-level=high

  ui:
    name: ui (lint · build · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx eslint src test
      - run: npm run build
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-ui
          path: ui/coverage/coverage-summary.json
          retention-days: 1
      - run: npm audit --audit-level=high

  # Combined coverage gate: sums the two packages' covered/total counts into one
  # repo-wide number and fails under 80% (statements + lines). It reuses the
  # summaries the server/ui jobs already produced (downloaded as artifacts) — the
  # suites are not re-run here. See scripts/coverage-check.cjs for the rationale.
  coverage:
    name: coverage (combined ≥80%)
    runs-on: ubuntu-latest
    needs: [server, ui]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          name: coverage-server
          path: server/coverage
      - uses: actions/download-artifact@v4
        with:
          name: coverage-ui
          path: ui/coverage
      - run: node scripts/coverage-check.cjs
