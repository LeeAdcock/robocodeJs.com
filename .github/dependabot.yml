# Automated dependency-update PRs (OWASP A06-1: keep dependencies patched and
# surface vulnerable/outdated packages). Weekly, grouped to limit PR noise.
version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      server-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ui-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
