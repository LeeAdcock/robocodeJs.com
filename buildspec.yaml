version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      # `npm ci` installs strictly from the lockfiles (ui/package-lock.json,
      # server/npm-shrinkwrap.json) for reproducible, tamper-evident builds.
      - (cd ui && npm ci)
      - (cd server && npm ci)
  build:
    commands:
      - (cd ui && npm run build)
      - (cd server && npm run build)
artifacts:
  base-directory: server
  files:
    - 'package.json'
    # Ship the shrinkwrap so Elastic Beanstalk installs with `npm ci` from the
    # pinned tree — matching the `npm run package` artifact used for manual
    # deploys, so the automated and manual paths install identically.
    - 'npm-shrinkwrap.json'
    - 'dist/**/*'
    - '.ebextensions/**/*'
    # Vendored AWS RDS CA bundle, read at runtime by util/db.ts to verify the
    # TLS connection to RDS. Must be deployed alongside dist/.
    - 'certs/**/*'
